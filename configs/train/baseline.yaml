seed: 42

experiment:
  name: baseline_v1

data:
  train_manifest: data/manifests/esc10_miniset_train.jsonl
  valid_manifest: data/manifests/esc10_miniset_valid.jsonl
  sample_rate: 16000
  clip_seconds: 5.0
  n_fft: 1024
  hop_length: 256
  win_length: 1024
  n_mels: 64

model:
  in_channels: 1
  base_channels: 32
  bottleneck_channels: 128

train:
  batch_size: 8
  num_workers: 0
  epochs: 10
  lr: 0.001
  weight_decay: 0.0001
  mse_weight: 0.1
  grad_clip: 1.0
  log_every_n_steps: 5
  resume: ""

output:
  root_dir: artifacts/experiments