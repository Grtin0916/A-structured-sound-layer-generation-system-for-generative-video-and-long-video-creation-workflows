server:
  host: 0.0.0.0
  port: 8000

service:
  name: baseline-v1-api
  api_version: v0.1

runtime:
  backend: onnxruntime
  provider_requested: CPUExecutionProvider

model:
  name: baseline_v1
  version: baseline_v1
  artifact_path: artifacts/onnx/baseline_v1.onnx
  input_name: mel
  output_name: recon_mel
  input_shape: [1, 1, 64, 313]
  output_shape: [1, 1, 64, 313]
  contract_type: fixed_shape

logging:
  log_dir: artifacts/logs
