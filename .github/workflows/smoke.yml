name: smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ort-cpu-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install minimal dependencies
        run: |
          pip install \
            torch \
            torchaudio \
            tensorboard \
            pyyaml \
            soundfile \
            librosa \
            tqdm \
            onnx \
            onnxruntime

      - name: Verify key assets
        run: |
          test -f configs/train/baseline.yaml
          test -f artifacts/experiments/baseline_v1/checkpoints/best.pt

      - name: Prepare output dirs
        run: |
          mkdir -p artifacts/onnx artifacts/logs docs/benchmarks

      - name: Run smoke demo
        run: |
          bash scripts/run_demo.sh demo 2>&1 | tee artifacts/logs/week02_ci_smoke_github.log

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: week02-smoke-artifacts
          path: |
            artifacts/onnx/baseline_v1.onnx
            artifacts/logs/onnx_parity.md
            artifacts/logs/bench_ort_cpu.csv
            artifacts/logs/week02_ci_smoke_github.log
            docs/benchmarks/ort_cpu_baseline.md
